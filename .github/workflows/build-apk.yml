name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor + Vite plugins
        run: npm install --legacy-peer-deps @capacitor/core @capacitor/cli @capacitor/android @vitejs/plugin-react vite-tsconfig-paths

      - name: Create index.html for SPA build
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="fa" dir="rtl">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>کمالی - مدیریت انبار</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.tsx"></script>
            </body>
          </html>
          EOF

      - name: Stub @tanstack/react-start completely
        run: |
          mkdir -p node_modules/@tanstack/react-start/dist
          cat > node_modules/@tanstack/react-start/package.json << 'EOF'
          {
            "name": "@tanstack/react-start",
            "version": "0.0.0-stub",
            "main": "./dist/index.js",
            "module": "./dist/index.js",
            "exports": {
              ".": "./dist/index.js",
              "./server-entry": "./dist/index.js"
            }
          }
          EOF
          cat > node_modules/@tanstack/react-start/dist/index.js << 'EOF'
          // Stub for SPA/Capacitor build — server functions run directly on client
          export function createServerFn(options) {
            return function(fn) {
              const serverFn = fn || options;
              const callable = async (input) => {
                if (typeof serverFn === 'function') return serverFn(input);
                return null;
              };
              callable.validator = (fn) => callable;
              callable.handler = (fn) => { Object.assign(callable, { _handler: fn }); return callable; };
              callable.inputValidator = (fn) => callable;
              callable.middleware = (fns) => callable;
              return callable;
            };
          }
          export function useServerFn(fn) {
            return fn;
          }
          export function createMiddleware() {
            return {
              server: (fn) => ({ _server: fn }),
              client: (fn) => ({ _client: fn }),
            };
          }
          export function createStart(fn) {
            return fn ? fn() : {};
          }
          export default {};
          EOF

      - name: Override __root.tsx for SPA mode
        run: |
          cat > src/routes/__root.tsx << 'EOF'
          import { QueryClient, QueryClientProvider } from "@tanstack/react-query";
          import { Outlet, createRootRouteWithContext } from "@tanstack/react-router";
          import { AuthProvider } from "@/lib/AuthContext";
          import { KamaliSplash } from "@/components/KamaliSplash";
          import { InstallAppPrompt } from "@/components/InstallAppPrompt";
          import { registerServiceWorker } from "@/registerSW";

          export const Route = createRootRouteWithContext<{ queryClient: QueryClient }>()({
            component: RootComponent,
          });

          function RootComponent() {
            const { queryClient } = Route.useRouteContext();
            if (typeof window !== "undefined") {
              registerServiceWorker();
            }
            return (
              <QueryClientProvider client={queryClient}>
                <AuthProvider>
                  <KamaliSplash />
                  <Outlet />
                  <InstallAppPrompt />
                </AuthProvider>
              </QueryClientProvider>
            );
          }
          EOF

      - name: Override router.tsx for SPA mode
        run: |
          cat > src/router.tsx << 'EOF'
          import { QueryClient } from "@tanstack/react-query";
          import { createRouter, createHashHistory } from "@tanstack/react-router";
          import { routeTree } from "./routeTree.gen";

          export const getRouter = () => {
            const queryClient = new QueryClient();
            const router = createRouter({
              routeTree,
              history: createHashHistory(),
              context: { queryClient },
              defaultPreloadStaleTime: 0,
            });
            return router;
          };
          EOF

      - name: Create main.tsx for SPA mode
        run: |
          cat > src/main.tsx << 'EOF'
          import React from "react";
          import ReactDOM from "react-dom/client";
          import { RouterProvider } from "@tanstack/react-router";
          import { getRouter } from "./router";
          import "./styles.css";

          const router = getRouter();

          ReactDOM.createRoot(document.getElementById("root")!).render(
            <React.StrictMode>
              <RouterProvider router={router} />
            </React.StrictMode>
          );
          EOF

      - name: Override vite.config.ts for static SPA build
        run: |
          cat > vite.config.ts << 'EOF'
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";
          import tsconfigPaths from "vite-tsconfig-paths";
          import tailwindcss from "@tailwindcss/vite";
          import path from "path";

          export default defineConfig({
            plugins: [react(), tsconfigPaths(), tailwindcss()],
            resolve: {
              alias: {
                "@": path.resolve(__dirname, "./src"),
              },
            },
            build: {
              outDir: "dist",
            },
          });
          EOF

      - name: Stub out server-only source files
        run: |
          echo "export {};" > src/start.ts
          echo "export {};" > src/server.ts
          cat > src/integrations/supabase/auth-attacher.ts << 'EOF'
          export const attachSupabaseAuth = async ({ next }: any) => next();
          EOF
          cat > src/integrations/supabase/auth-middleware.ts << 'EOF'
          export const requireSupabaseAuth = async ({ next }: any) => next();
          EOF
          echo "export const config = {};" > src/lib/config.server.ts
          echo "export {};" > src/lib/api/example.functions.ts

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://wchghogprftrurbcarvp.supabase.co" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjaGdob2dwcmZ0cnVyYmNhcnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMzMjQsImV4cCI6MjA5NjY2OTMyNH0.y2LIlgnIhlDXM6fRxYhPoYFDSISvB4FLK5YJxqmASyM" >> .env

      - name: Build web app
        run: npm run build

      - name: Create capacitor.config.ts
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.kamali.inventory',
            appName: 'کمالی انبار',
            webDir: 'dist',
            server: { androidScheme: 'https' }
          };
          export default config;
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin duplicate and lower minSdk
        run: |
          python3 - << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          content = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 22', content)
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 22', content)

          fix = """
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          """
          content = content + fix

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("Done!")
          PYEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kamali-inventory-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
