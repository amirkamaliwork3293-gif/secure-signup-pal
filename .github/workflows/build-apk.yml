name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# جلوگیری از اجرای همزمان دو بیلد (push پشت‌سرهم)
concurrency:
  group: build-apk
  cancel-in-progress: true

env:
  APP_URL: https://kamixapp.ir
  APP_ID: com.kamali.inventory
  APP_NAME: کامیکس

jobs:
  build:
    runs-on: ubuntu-latest
    # کامیت خودکارِ APK با [skip ci] انجام می‌شود و این job را دوباره اجرا نمی‌کند

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # پلاگین‌های نیتیو:
      #   Printer    → چاپ واقعی فاکتور/لیبل داخل اپ (دیالوگ چاپ اندروید + ذخیره PDF)
      #   Filesystem → ذخیره فایل PDF/PNG داخل اپ
      #   Share      → باز کردن پنجره ذخیره/ارسال فایل اندروید
      #   Voice bridge → ضبط مستقیم میکروفون اندروید برای «ثبت صوتی»
      - name: Install Capacitor + native plugins
        run: npm install --legacy-peer-deps @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share @bcyesil/capacitor-plugin-printer

      - name: Create fallback web folder
        run: |
          rm -rf android dist
          mkdir -p dist
          cat > dist/index.html << EOF
          <!doctype html>
          <html lang="fa" dir="rtl">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
              <meta http-equiv="refresh" content="0;url=${APP_URL}" />
              <title>${APP_NAME}</title>
              <style>
                body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: sans-serif; background: #f8fafc; color: #0f172a; }
                main { text-align: center; padding: 24px; }
                a { color: #2563eb; font-weight: 700; }
              </style>
            </head>
            <body>
              <main>
                <h1>در حال باز کردن ${APP_NAME}...</h1>
                <p><a href="${APP_URL}">اگر برنامه باز نشد اینجا بزنید</a></p>
              </main>
              <script>window.location.replace("${APP_URL}");</script>
            </body>
          </html>
          EOF

      - name: Create capacitor.config.ts
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: process.env.APP_ID || 'com.kamali.inventory',
            appName: process.env.APP_NAME || 'کامیکس',
            webDir: 'dist',
            server: {
              url: process.env.APP_URL || 'https://secure-signup-pal.lovable.app',
              cleartext: false,
            },
            android: {
              webContentsDebuggingEnabled: true,
              allowMixedContent: false,
            },
          };

          export default config;
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply Kamix app icon
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android/app/src/main/res/mipmap-$d-v4"
            mkdir -p "android/app/src/main/res/mipmap-$d"

            for f in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
              src="branding/android-icons/mipmap-$d-v4/$f"
              if [ -f "$src" ]; then
                cp "$src" "android/app/src/main/res/mipmap-$d-v4/$f"
                cp "$src" "android/app/src/main/res/mipmap-$d/$f"
              else
                echo "Warning: source icon not found: $src (skipping)"
              fi
            done
          done
          echo "Kamix icons applied"

      - name: Lower minSdk for older Android devices
        run: |
          python3 - << 'PYEOF'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

          content = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 22', content)
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 22', content)

          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)

          print('minSdk set to 22')
          PYEOF

      - name: Force single Kotlin stdlib version (fix duplicate classes)
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.8.22'
              }
          }
          EOF

      - name: Add camera permissions to AndroidManifest
        run: |
          python3 - << 'PYEOF'
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest_path, 'r') as f:
              content = f.read()
          permissions = [
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-feature android:name="android.hardware.camera" android:required="false" />',
              '<uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />',
              '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
              '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />',
          ]
          for perm in permissions:
              if perm not in content:
                  content = content.replace('<application', perm + '\n    <application', 1)
          with open(manifest_path, 'w') as f:
              f.write(content)
          print("Camera permissions added!")
          PYEOF

      # WebView به‌صورت پیش‌فرض درخواست‌های دسترسی به میکروفون/دوربین (getUserMedia)
      # از صفحات راه‌دور را رد می‌کند. علاوه بر WebChromeClient، یک پل صوتی اختصاصی
      # KamaliVoice با Android MediaRecorder تزریق می‌کنیم تا «ثبت صوتی» حتی بدون
      # Web Speech / getUserMedia / پلاگین Capacitor هم در APK کار کند.
      - name: Patch MainActivity to grant WebView mic/camera permissions
        run: |
          python3 - << 'PYEOF'
          import os, glob, re
          matches = glob.glob('android/app/src/main/java/**/MainActivity.java', recursive=True)
          if not matches:
              print('MainActivity.java not found — skipping')
          else:
              path = matches[0]
              code = '''package com.kamali.inventory;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.media.MediaRecorder;
          import android.os.Build;
          import android.os.Bundle;
          import android.util.Base64;
          import android.webkit.JavascriptInterface;
          import android.webkit.PermissionRequest;
          import android.webkit.WebView;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebChromeClient;
          import org.json.JSONObject;
          import java.io.ByteArrayOutputStream;
          import java.io.File;
          import java.io.FileInputStream;

          public class MainActivity extends BridgeActivity {
              private static final int REQ_MEDIA = 1207;
              private MediaRecorder voiceRecorder;
              private File voiceFile;
              private boolean pendingVoiceStart = false;
              private PermissionRequest pendingWebPermissionRequest;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = this.bridge.getWebView();
                  webView.getSettings().setMediaPlaybackRequiresUserGesture(false);
                  webView.addJavascriptInterface(new KamaliVoiceBridge(), "KamaliVoice");
                  webView.setWebChromeClient(new BridgeWebChromeClient(this.bridge) {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          runOnUiThread(() -> {
                              if (hasPermissionsForWebRequest(request)) {
                                  safeGrant(request);
                                  return;
                              }
                              pendingWebPermissionRequest = request;
                              requestRuntimeMediaPermissions(true, true);
                          });
                      }
                  });
                  webView.post(() -> webView.evaluateJavascript("window.__KAMALI_NATIVE_APP=true;", null));
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode != REQ_MEDIA) return;

                  PermissionRequest webRequest = pendingWebPermissionRequest;
                  pendingWebPermissionRequest = null;
                  if (webRequest != null) {
                      if (hasPermissionsForWebRequest(webRequest)) safeGrant(webRequest);
                      else safeDeny(webRequest);
                  }

                  if (pendingVoiceStart) {
                      pendingVoiceStart = false;
                      if (hasRecordPermission()) startVoiceRecordingNow();
                      else dispatchVoiceError("اجازه میکروفون داده نشد. از تنظیمات گوشی، دسترسی میکروفون برنامه را فعال کنید.");
                  }
              }

              private void requestRuntimeMediaPermissions(boolean audio, boolean camera) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.M) return;
                  java.util.ArrayList<String> permissions = new java.util.ArrayList<>();
                  if (audio && ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.RECORD_AUDIO);
                  }
                  if (camera && ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.CAMERA);
                  }
                  if (!permissions.isEmpty()) ActivityCompat.requestPermissions(this, permissions.toArray(new String[0]), REQ_MEDIA);
              }

              private boolean hasRecordPermission() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.M) return true;
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED;
              }

              private boolean hasCameraPermission() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.M) return true;
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED;
              }

              private boolean hasPermissionsForWebRequest(PermissionRequest request) {
                  boolean needsAudio = false;
                  boolean needsCamera = false;
                  for (String resource : request.getResources()) {
                      if (PermissionRequest.RESOURCE_AUDIO_CAPTURE.equals(resource)) needsAudio = true;
                      if (PermissionRequest.RESOURCE_VIDEO_CAPTURE.equals(resource)) needsCamera = true;
                  }
                  return (!needsAudio || hasRecordPermission()) && (!needsCamera || hasCameraPermission());
              }

              private void safeGrant(PermissionRequest request) {
                  try { request.grant(request.getResources()); } catch (Exception ignored) {}
              }

              private void safeDeny(PermissionRequest request) {
                  try { request.deny(); } catch (Exception ignored) {}
              }

              private void dispatchVoiceError(String message) {
                  WebView webView = this.bridge.getWebView();
                  String js = "window.dispatchEvent(new CustomEvent('kamali-native-audio-error',{detail:{error:" + JSONObject.quote(message) + "}}));";
                  webView.post(() -> webView.evaluateJavascript(js, null));
              }

              private void dispatchVoiceResult(String base64) {
                  WebView webView = this.bridge.getWebView();
                  String js = "window.dispatchEvent(new CustomEvent('kamali-native-audio',{detail:{audioBase64:" + JSONObject.quote(base64) + ",format:'m4a'}}));";
                  webView.post(() -> webView.evaluateJavascript(js, null));
              }

              private byte[] readFile(File file) throws Exception {
                  ByteArrayOutputStream out = new ByteArrayOutputStream();
                  FileInputStream in = new FileInputStream(file);
                  byte[] buf = new byte[8192];
                  int n;
                  while ((n = in.read(buf)) > 0) out.write(buf, 0, n);
                  in.close();
                  return out.toByteArray();
              }

              private void stopRecorderOnly() {
                  if (voiceRecorder != null) {
                      try { voiceRecorder.stop(); } catch (Exception ignored) {}
                      try { voiceRecorder.release(); } catch (Exception ignored) {}
                      voiceRecorder = null;
                  }
              }

              private void startVoiceRecordingNow() {
                  try {
                      stopRecorderOnly();
                      voiceFile = File.createTempFile("kamali-voice-", ".m4a", getCacheDir());
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) voiceRecorder = new MediaRecorder(MainActivity.this);
                      else voiceRecorder = new MediaRecorder();
                      try {
                          voiceRecorder.setAudioSource(MediaRecorder.AudioSource.VOICE_RECOGNITION);
                      } catch (Exception ignored) {
                          voiceRecorder.setAudioSource(MediaRecorder.AudioSource.MIC);
                      }
                      voiceRecorder.setOutputFormat(MediaRecorder.OutputFormat.MPEG_4);
                      voiceRecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AAC);
                      voiceRecorder.setAudioEncodingBitRate(128000);
                      voiceRecorder.setAudioSamplingRate(44100);
                      voiceRecorder.setOutputFile(voiceFile.getAbsolutePath());
                      voiceRecorder.prepare();
                      voiceRecorder.start();
                  } catch (Exception e) {
                      stopRecorderOnly();
                      dispatchVoiceError("ضبط صدا در اپلیکیشن شروع نشد: " + e.getMessage());
                  }
              }

              public class KamaliVoiceBridge {
                  @JavascriptInterface
                  public void start() {
                      runOnUiThread(() -> {
                          if (!hasRecordPermission()) {
                              pendingVoiceStart = true;
                              requestRuntimeMediaPermissions(true, false);
                              return;
                          }
                          startVoiceRecordingNow();
                      });
                  }

                  @JavascriptInterface
                  public void stop() {
                      runOnUiThread(() -> {
                          try {
                              if (voiceRecorder == null || voiceFile == null) {
                                  dispatchVoiceError("ضبطی فعال نبود.");
                                  return;
                              }
                              stopRecorderOnly();
                              byte[] data = readFile(voiceFile);
                              if (data.length < 2048) {
                                  dispatchVoiceError("صدایی ضبط نشد. دوباره ضبط کنید.");
                                  return;
                              }
                              dispatchVoiceResult(Base64.encodeToString(data, Base64.NO_WRAP));
                              try { voiceFile.delete(); } catch (Exception ignored) {}
                          } catch (Exception e) {
                              stopRecorderOnly();
                              dispatchVoiceError("پردازش صدای ضبط‌شده ناموفق بود: " + e.getMessage());
                          }
                      });
                  }
              }
          }
          '''
              # نام پکیج را با مسیر فایل تطبیق می‌دهیم تا کامپایل نشکند
              pkg_match = re.search(r'java/(.+)/MainActivity\.java$', path)
              if pkg_match:
                  pkg = pkg_match.group(1).replace('/', '.')
                  code = code.replace('package com.kamali.inventory;', f'package {pkg};')
              with open(path, 'w') as f:
                  f.write(code)
              print(f'Patched {path}')
          PYEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kamali-accounting-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # انتشار APK روی خود سایت: فایل در public/ کامیت می‌شود و سایت آن را
      # مستقیم در آدرس /kamali-accounting.apk سرو می‌کند (بدون گیت‌هاب).
      - name: Publish APK to website (public folder)
        if: github.ref == 'refs/heads/main'
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk public/kamali-accounting.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/kamali-accounting.apk
          if git diff --cached --quiet; then
            echo "APK unchanged — nothing to publish"
          else
            git commit -m "chore: publish latest Android APK to website [skip ci]"
            git pull --rebase --autostash origin main
            git push origin main
          fi
